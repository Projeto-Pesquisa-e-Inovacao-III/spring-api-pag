name: Continuous Integration

on:
  push:
    branches: [main, develop, feat/ci-cd]

concurrency:
  group: deploy-backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/spring-api-pag

    steps:
      - uses: actions/checkout@v4
      - name: Validate RabbitMQ volume files
        run: |
          ls -la rabbitmq
          test -f rabbitmq/rabbitmq.conf
          test -f rabbitmq/definitions.json
      - name: Set up java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Give permission to mvnw
        run: chmod +x mvnw

      - name: Build and test
        run: ./mvnw clean verify

      - name: Build payment image
        run: |
          docker build -f Dockerfile.deploy.yaml -t payment:latest -t ${IMAGE_NAME}:latest -t ${IMAGE_NAME}:${{ github.sha }} .

      - name: Pull rabbitmq and ngrok images
        run: |
          docker pull rabbitmq:4-management-alpine
          docker pull ngrok/ngrok:latest

      - name: Generate compose env file
        run: |
          cat <<EOF > .env
          PAGBANK_API_URL=${{ secrets.PAGBANK_API_URL }}
          PAGBANK_API_TOKEN=${{ secrets.PAGBANK_API_TOKEN }}
          PAGBANK_API_PAY_URL=${{ secrets.PAGBANK_API_PAY_URL }}
          GATEWAY_CONFIG_NOTIFICATION_WEBHOOK_URLS=${{ secrets.GATEWAY_CONFIG_NOTIFICATION_WEBHOOK_URLS }}
          GATEWAY_CONFIG_PAYMENT_NOTIFICATION_URLS=${{ secrets.GATEWAY_CONFIG_PAYMENT_NOTIFICATION_URLS }}
          GATEWAY_CONFIG_PAYMENT_METHOD=${{ secrets.GATEWAY_CONFIG_PAYMENT_METHOD }}
          GATEWAY_CONFIG_SOFT_DESCRIPTOR=${{ secrets.GATEWAY_CONFIG_SOFT_DESCRIPTOR }}
          GATEWAY_CONFIG_RETURN_URL=${{ secrets.GATEWAY_CONFIG_RETURN_URL }}
          GATEWAY_CONFIG_REDIRECT_URL=${{ secrets.GATEWAY_CONFIG_REDIRECT_URL }}
          GATEWAY_CONFIG_CUSTOMER_MODIFIABLE=${{ secrets.GATEWAY_CONFIG_CUSTOMER_MODIFIABLE }}
          EVENT_URLS=${{ secrets.EVENT_URLS }}
          SPRING_RABBITMQ_PORT=${{ secrets.SPRING_RABBITMQ_PORT }}
          SPRING_RABBITMQ_USERNAME=${{ secrets.SPRING_RABBITMQ_USERNAME }}
          SPRING_RABBITMQ_PASSWORD=${{ secrets.SPRING_RABBITMQ_PASSWORD }}
          SPRING_RABBITMQ_VHOST=${{ secrets.SPRING_RABBITMQ_VHOST }}
          PAYMENT_WEBHOOK_SECRET=${{ secrets.PAYMENT_WEBHOOK_SECRET }}
          MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          NGROK_URL=${{ secrets.NGROK_URL }}
          NGROK_AUTHTOKEN=${{ secrets.NGROK_AUTHTOKEN }}
          EOF

      - name: Validate env file
        run: EXPECT_RABBITMQ_VHOST=/app bash .github/scripts/validate_ci_env.sh .env

      - name: Run compose stack and smoke test
        run: |
          docker compose -f compose.prod.yaml -f compose.ci.yaml --env-file .env up -d || true
          docker compose -f compose.prod.yaml -f compose.ci.yaml --env-file .env ps

          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            if [ "$code" != "000" ]; then
              echo "Smoke test passed"
              exit 0
            fi

            if [ -z "$(docker ps -q -f name=payment-service -f status=running)" ]; then
              echo "Container stopped unexpectedly. Logs:"
              docker logs payment-service || true
              exit 1
            fi

            sleep 2
          done

          echo "Smoke test timed out. Logs:"
          docker logs payment-service || true
          exit 1

      - name: Cleanup compose stack
        if: always()
        run: docker compose -f compose.prod.yaml -f compose.ci.yaml --env-file .env down -v || true

      - name: login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:${{ github.sha }}

  deploy-aws-vm-1:
    needs: continuous-integration
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, api-pag]

    steps:
      - uses: actions/checkout@v4
      - name: Deploy stub
        run: bash .github/scripts/deploy_payment_compose_stub.sh

