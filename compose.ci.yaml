services:
  payment:
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-payment}
      MYSQL_USER: ${MYSQL_USER:-payment}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-payment}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-payment}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-payment}", "-p${MYSQL_PASSWORD:-payment}"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - payment-net

